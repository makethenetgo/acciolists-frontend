name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Create release
        id: semantic
        uses: dnogu/semantic-release-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          base_release: true

      - name: Build release metadata
        shell: bash
        run: |
          printf 'published=%s\ntag=%s\n' \
            "${{ steps.semantic.outputs.released || 'false' }}" \
            "${{ steps.semantic.outputs.tag-name }}" \
            > release-metadata.env

      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: release-metadata.env
          retention-days: 1
